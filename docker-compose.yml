services:
  postgres:
    image: postgres:16-alpine
    container_name: cabins-postgres
    environment:
      POSTGRES_DB: cabins_db
      POSTGRES_USER: cabins_app
      POSTGRES_PASSWORD: cabins_password
    ports:
      - "5432:5432"
    volumes:
      - cabins_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cabins_app -d cabins_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cabins_postgres_data:
